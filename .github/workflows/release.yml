name: Release

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload artifacts to the current tag release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build app bundles
        run: npm run build

  release-build:
    name: Build release binaries (${{ matrix.os }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: clipmyboard-linux-release
            files: |
              release/*.AppImage
              release/*.deb
              release/latest-linux.yml
          - os: windows-latest
            platform: win
            artifact: clipmyboard-windows-release
            files: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            platform: mac
            artifact: clipmyboard-macos-release
            files: |
              release/*.dmg
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build release artifacts
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      - name: Upload artifacts to GitHub release
        if: github.event_name == 'release' || inputs.upload_to_release == true
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
